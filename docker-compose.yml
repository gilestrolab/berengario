services:
  # MariaDB Database (shared by production and development)
  mariadb:
    image: mariadb:11.2
    container_name: raginbox-db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: test_root_password
      MYSQL_DATABASE: raginbox
      MYSQL_USER: raginbox
      MYSQL_PASSWORD: test_password

    volumes:
      - raginbox-db-data:/var/lib/mysql

    ports:
      - "3307:3306"  # Use 3307 to avoid conflicts with local MySQL

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    networks:
      - raginbox-network

  # Development Container (for testing, linting, formatting)
  # This container only starts when explicitly requested with: docker-compose --profile dev up
  raginbox-dev:
    profiles: ["dev"]  # Don't start by default, only with --profile dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev  # Use dev image with all testing tools
    container_name: raginbox-dev
    restart: "no"  # Don't auto-restart - this is a utility container
    command: tail -f /dev/null  # Keep container alive for running commands

    env_file:
      - .env

    environment:
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: raginbox
      DB_USER: raginbox
      DB_PASSWORD: test_password

    volumes:
      - ./src:/app/src  # Mount src for live code changes
      - ./tests:/app/tests  # Mount tests for development
      - ./.git:/app/.git:ro  # Mount git directory (read-only) for version info
      - ./data/kb:/app/data/kb  # Mount KB structure (documents, emails, archive)
      - ./data/documents:/app/data/documents  # Legacy mount (can be removed after migration)
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/logs:/app/data/logs
      - ./data/config:/app/data/config
      - ./data/temp_attachments:/app/data/temp_attachments
      - ./data/backups:/app/data/backups

    depends_on:
      mariadb:
        condition: service_healthy

    networks:
      - raginbox-network

  # RAGInbox Email Service (depends on MariaDB)
  raginbox-email:
    build:
      context: .
      dockerfile: Dockerfile
      target: production  # Use production image (minimal size)
    container_name: raginbox-email
    restart: unless-stopped
    command: python run_email_service.py

    env_file:
      - .env

    # Override DB settings for MariaDB
    environment:
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: raginbox
      DB_USER: raginbox
      DB_PASSWORD: test_password
      GIT_BRANCH: ${GIT_BRANCH:-unknown}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}

    volumes:
      - ./src:/app/src  # Mount src for live code changes during development
      - ./tests:/app/tests  # Mount tests for development testing
      - ./.git:/app/.git:ro  # Mount git directory (read-only) for version info
      - ./data/kb:/app/data/kb  # Mount KB structure (documents, emails, archive)
      - ./data/documents:/app/data/documents  # Legacy mount (can be removed after migration)
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/logs:/app/data/logs
      - ./data/config:/app/data/config
      - ./data/temp_attachments:/app/data/temp_attachments
      - ./data/backups:/app/data/backups  # Mount backups for persistence

    depends_on:
      mariadb:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

    networks:
      - raginbox-network

  # RAGInbox Web Interface (depends on MariaDB)
  raginbox-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production  # Use production image (minimal size)
    container_name: raginbox-web
    restart: unless-stopped
    command: python run_web_service.py

    env_file:
      - .env

    # Override DB settings for MariaDB
    environment:
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: raginbox
      DB_USER: raginbox
      DB_PASSWORD: test_password
      GIT_BRANCH: ${GIT_BRANCH:-unknown}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}

    volumes:
      - ./src:/app/src  # Mount src for live code changes during development
      - ./tests:/app/tests  # Mount tests for development testing
      - ./.git:/app/.git:ro  # Mount git directory (read-only) for version info
      - ./data/kb:/app/data/kb  # Mount KB structure (documents, emails, archive)
      - ./data/documents:/app/data/documents  # Legacy mount (can be removed after migration)
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/logs:/app/data/logs
      - ./data/config:/app/data/config
      - ./data/temp_attachments:/app/data/temp_attachments
      - ./data/backups:/app/data/backups  # Mount backups for persistence

    ports:
      - "8090:8000"  # Web interface port (host:container)

    depends_on:
      mariadb:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

    networks:
      - raginbox-network

networks:
  raginbox-network:
    driver: bridge

volumes:
  raginbox-db-data:
    driver: local
