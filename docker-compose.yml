services:
  # MariaDB Database (shared by production and development)
  mariadb:
    image: mariadb:11.2
    container_name: berengario-db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: test_root_password
      MYSQL_DATABASE: berengario
      MYSQL_USER: berengario
      MYSQL_PASSWORD: test_password

    volumes:
      - berengario-db-data:/var/lib/mysql

    ports:
      - "3307:3306"  # Use 3307 to avoid conflicts with local MySQL

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    networks:
      - berengario-network

  # Development Container (for testing, linting, formatting)
  # This container only starts when explicitly requested with: docker-compose --profile dev up
  berengario-dev:
    profiles: ["dev"]  # Don't start by default, only with --profile dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev  # Use dev image with all testing tools
    container_name: berengario-dev
    restart: "no"  # Don't auto-restart - this is a utility container
    command: tail -f /dev/null  # Keep container alive for running commands

    env_file:
      - .env

    environment:
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: berengario
      DB_USER: berengario
      DB_PASSWORD: test_password

    volumes:
      - ./src:/app/src  # Mount src for live code changes
      - ./tests:/app/tests  # Mount tests for development
      - ./.git:/app/.git:ro  # Mount git directory (read-only) for version info
      - ./data/kb:/app/data/kb  # Mount KB structure (documents, emails, archive)
      - ./data/documents:/app/data/documents  # Legacy mount (can be removed after migration)
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/logs:/app/data/logs
      - ./data/config:/app/data/config
      - ./data/temp_attachments:/app/data/temp_attachments
      - ./data/backups:/app/data/backups

    depends_on:
      mariadb:
        condition: service_healthy

    networks:
      - berengario-network

  # Berengario Email Service (depends on MariaDB)
  berengario-email:
    build:
      context: .
      dockerfile: Dockerfile
      target: production  # Use production image (minimal size)
    container_name: berengario-email
    restart: unless-stopped
    command: python run_email_service.py

    env_file:
      - .env

    # Override DB settings for MariaDB
    environment:
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: berengario
      DB_USER: berengario
      DB_PASSWORD: test_password
      GIT_BRANCH: ${GIT_BRANCH:-unknown}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}

    volumes:
      - ./src:/app/src  # Mount src for live code changes during development
      - ./tests:/app/tests  # Mount tests for development testing
      - ./.git:/app/.git:ro  # Mount git directory (read-only) for version info
      - ./data/kb:/app/data/kb  # Mount KB structure (documents, emails, archive)
      - ./data/documents:/app/data/documents  # Legacy mount (can be removed after migration)
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/logs:/app/data/logs
      - ./data/config:/app/data/config
      - ./data/temp_attachments:/app/data/temp_attachments
      - ./data/backups:/app/data/backups  # Mount backups for persistence

    depends_on:
      mariadb:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

    networks:
      - berengario-network

  # Berengario Web Interface (depends on MariaDB)
  berengario-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production  # Use production image (minimal size)
    container_name: berengario-web
    restart: unless-stopped
    command: python run_web_service.py

    env_file:
      - .env

    # Override DB settings for MariaDB
    environment:
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: berengario
      DB_USER: berengario
      DB_PASSWORD: test_password
      GIT_BRANCH: ${GIT_BRANCH:-unknown}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}

    volumes:
      - ./src:/app/src  # Mount src for live code changes during development
      - ./tests:/app/tests  # Mount tests for development testing
      - ./.git:/app/.git:ro  # Mount git directory (read-only) for version info
      - ./data/kb:/app/data/kb  # Mount KB structure (documents, emails, archive)
      - ./data/documents:/app/data/documents  # Legacy mount (can be removed after migration)
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/logs:/app/data/logs
      - ./data/config:/app/data/config
      - ./data/temp_attachments:/app/data/temp_attachments
      - ./data/backups:/app/data/backups  # Mount backups for persistence

    ports:
      - "8090:8000"  # Web interface port (host:container)

    depends_on:
      mariadb:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

    networks:
      - berengario-network

  # MinIO Object Storage (S3-compatible, for multi-tenant file storage)
  # Only starts when explicitly requested with: docker-compose --profile multitenant up
  minio:
    profiles: ["multitenant"]
    image: minio/minio:latest
    container_name: berengario-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console

    volumes:
      - berengario-minio-data:/data

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - berengario-network

networks:
  berengario-network:
    driver: bridge

volumes:
  berengario-db-data:
    driver: local
  berengario-minio-data:
    driver: local
