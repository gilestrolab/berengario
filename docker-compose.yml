services:
  # MariaDB Database (shared by production and development)
  mariadb:
    image: mariadb:11.2
    container_name: berengario-db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      - berengario-db-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro

    expose:
      - "3306"

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    networks:
      - berengario-network

  # Development Container (for testing, linting, formatting)
  # This container only starts when explicitly requested with: docker-compose --profile dev up
  berengario-dev:
    profiles: ["dev"]  # Don't start by default, only with --profile dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev  # Use dev image with all testing tools
    container_name: berengario-dev
    restart: "no"  # Don't auto-restart - this is a utility container
    command: tail -f /dev/null  # Keep container alive for running commands

    env_file:
      - .env

    volumes:
      - ./src:/app/src  # Mount src for live code changes
      - ./tests:/app/tests  # Mount tests for development
      - ./.git:/app/.git:ro  # Mount git directory (read-only) for version info
      - ./data/kb:/app/data/kb  # Mount KB structure (documents, emails, archive)
      - ./data/documents:/app/data/documents  # Legacy mount (can be removed after migration)
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/cache:/app/data/cache  # S3 tenants: local ChromaDB cache
      - ./data/logs:/app/data/logs
      - ./data/config:/app/data/config
      - ./data/temp_attachments:/app/data/temp_attachments
      - ./data/backups:/app/data/backups
      - ./data/tenants:/app/data/tenants  # Multi-tenancy: per-tenant data

    depends_on:
      mariadb:
        condition: service_healthy

    networks:
      - berengario-network

  # Berengario Email Service (depends on MariaDB)
  berengario-email:
    build:
      context: .
      dockerfile: Dockerfile
      target: production  # Use production image (minimal size)
    container_name: berengario-email
    restart: unless-stopped
    command: python run_email_service.py

    env_file:
      - .env

    volumes:
      - ./src:/app/src  # Mount src for live code changes during development
      - ./tests:/app/tests  # Mount tests for development testing
      - ./.git:/app/.git:ro  # Mount git directory (read-only) for version info
      - ./data/kb:/app/data/kb  # Mount KB structure (documents, emails, archive)
      - ./data/documents:/app/data/documents  # Legacy mount (can be removed after migration)
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/cache:/app/data/cache  # S3 tenants: local ChromaDB cache
      - ./data/logs:/app/data/logs
      - ./data/config:/app/data/config
      - ./data/temp_attachments:/app/data/temp_attachments
      - ./data/backups:/app/data/backups  # Mount backups for persistence
      - ./data/tenants:/app/data/tenants  # Multi-tenancy: per-tenant data

    depends_on:
      mariadb:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

    networks:
      - berengario-network

  # Berengario Web Interface (depends on MariaDB)
  berengario-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production  # Use production image (minimal size)
    container_name: berengario-app
    restart: unless-stopped
    command: python run_web_service.py

    env_file:
      - .env

    volumes:
      - ./src:/app/src  # Mount src for live code changes during development
      - ./tests:/app/tests  # Mount tests for development testing
      - ./.git:/app/.git:ro  # Mount git directory (read-only) for version info
      - ./data/kb:/app/data/kb  # Mount KB structure (documents, emails, archive)
      - ./data/documents:/app/data/documents  # Legacy mount (can be removed after migration)
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/cache:/app/data/cache  # S3 tenants: local ChromaDB cache
      - ./data/logs:/app/data/logs
      - ./data/config:/app/data/config
      - ./data/temp_attachments:/app/data/temp_attachments
      - ./data/backups:/app/data/backups  # Mount backups for persistence
      - ./data/tenants:/app/data/tenants  # Multi-tenancy: per-tenant data

    expose:
      - "8000"

    depends_on:
      mariadb:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

    networks:
      - berengario-network
      - intranet

  # Platform Admin (multi-tenant management panel)
  # Only starts when explicitly requested with: docker-compose --profile multitenant up
  berengario-admin:
    profiles: ["multitenant"]
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: berengario-admin
    restart: unless-stopped
    command: python run_platform_admin.py

    env_file:
      - .env

    volumes:
      - ./src:/app/src
      - ./.git:/app/.git:ro
      - ./data/tenants:/app/data/tenants
      - ./data/logs:/app/data/logs

    expose:
      - "8000"

    depends_on:
      mariadb:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/platform/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - berengario-network
      - intranet

  # MinIO Object Storage (S3-compatible, for local multi-tenant file storage)
  # Only starts when explicitly requested with: docker-compose --profile minio up
  # Not needed when using external S3-compatible storage (e.g., Garage, AWS S3)
  minio:
    profiles: ["minio"]
    image: minio/minio:latest
    container_name: berengario-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console

    volumes:
      - berengario-minio-data:/data

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - berengario-network

networks:
  berengario-network:
    driver: bridge
  intranet:
    external: true

volumes:
  berengario-db-data:
    driver: local
  berengario-minio-data:
    driver: local
