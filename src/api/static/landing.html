<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Welcome - Berengario</title>
    <link rel="stylesheet" href="/static/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container landing-container">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <div class="auth-icon">
                    <img src="/static/berengario_logo.png" alt="Berengario" class="auth-logo">
                </div>
                <h1 class="auth-title" id="instance-name">Berengario</h1>
                <p class="auth-subtitle" id="instance-description">AI-powered Knowledge Base Assistant</p>
            </div>

            <!-- Action Cards -->
            <div class="landing-actions">
                <a href="/static/onboarding.html?mode=create" class="landing-card">
                    <div class="landing-card-icon">
                        <i class="fas fa-plus-circle"></i>
                    </div>
                    <div class="landing-card-content">
                        <h3>Create Account</h3>
                        <p>Set up a new team with your own knowledge base</p>
                    </div>
                    <i class="fas fa-chevron-right landing-card-arrow"></i>
                </a>

                <a href="/static/onboarding.html?mode=join" class="landing-card">
                    <div class="landing-card-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="landing-card-content">
                        <h3>Join a Team</h3>
                        <p>Use an invite code to join an existing team</p>
                    </div>
                    <i class="fas fa-chevron-right landing-card-arrow"></i>
                </a>

                <a href="/static/login.html" class="landing-card landing-card-subtle">
                    <div class="landing-card-icon">
                        <i class="fas fa-sign-in-alt"></i>
                    </div>
                    <div class="landing-card-content">
                        <h3>Login</h3>
                        <p>Already have an account? Sign in here</p>
                    </div>
                    <i class="fas fa-chevron-right landing-card-arrow"></i>
                </a>
            </div>
        </div>
    </div>

    <script src="/static/landing.js"></script>
</body>
</html>
