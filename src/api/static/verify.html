<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Verify Code - RAGInbox</title>
    <link rel="stylesheet" href="/static/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <h1 class="auth-title" id="instance-name">RAGInbox</h1>
                <p class="auth-subtitle" id="instance-description">AI-powered Knowledge Base Assistant</p>
                <p class="auth-subtitle" style="margin-top: 1rem;">
                    We sent a 6-digit code to<br>
                    <strong id="user-email"></strong>
                </p>
            </div>

            <!-- Verification Form -->
            <form id="verify-form" class="auth-form">
                <div class="form-group">
                    <label for="otp-code" class="form-label">Enter Code</label>
                    <input
                        type="text"
                        id="otp-code"
                        class="form-input otp-input"
                        placeholder="000000"
                        required
                        maxlength="6"
                        pattern="[0-9]{6}"
                        autocomplete="one-time-code"
                        autofocus
                    >
                    <p class="form-hint">Verifies automatically when you enter 6 digits</p>
                </div>

                <button type="submit" class="auth-button" id="submit-btn" style="display: none;">
                    <span class="button-text">Verifying...</span>
                    <span class="button-spinner">
                        <svg class="spinner" viewBox="0 0 24 24">
                            <circle class="spinner-circle" cx="12" cy="12" r="10"></circle>
                        </svg>
                    </span>
                </button>

                <!-- Error Message -->
                <div class="auth-message error" id="error-message" style="display: none;"></div>

                <!-- Success Message -->
                <div class="auth-message success" id="success-message" style="display: none;"></div>
            </form>

            <!-- Back Link -->
            <div class="auth-footer">
                <p class="auth-footer-text">
                    Didn't receive the code?
                    <a href="/static/login.html" class="auth-link">Request a new one</a>
                </p>
                <p class="auth-footer-text">
                    <a href="/static/login.html" class="auth-link">← Back to login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="/static/verify.js?v=20251111-1"></script>
</body>
</html>
